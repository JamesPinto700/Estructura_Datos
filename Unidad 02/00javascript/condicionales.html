<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Condicionales en JavaScript</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
      color: #333;
    }

    h1 {
      font-size: 22px;
      border-bottom: 2px solid #333;
      padding-bottom: 8px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 4px;
    }

    input, select {
      padding: 6px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      width: 200px;
    }

    button {
      margin-top: 10px;
      padding: 7px 16px;
      font-size: 14px;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: block;
    }

    button:hover { background: #555; }

    .resultado {
      margin-top: 10px;
      padding: 8px 12px;
      background: #eef4ff;
      border-left: 3px solid #4a6cf7;
      font-size: 14px;
      border-radius: 0 4px 4px 0;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Condicionales en JavaScript</h1>

  <!-- if / else if / else -->
  <div class="card">
    <h2>1. if / else if / else — Verificar calificación</h2>
    <label for="calificacion">Ingresa la calificación (0 - 10):</label>
    <input type="number" id="calificacion" placeholder="Ej: 8" min="0" max="10">
    <button onclick="ejecutarCalificacion()">Verificar</button>
    <div class="resultado" id="res-calificacion"></div>
  </div>

  <!-- switch -->
  <div class="card">
    <h2>2. switch — Día de la semana</h2>
    <label for="dia">Selecciona un día:</label>
    <select id="dia">
      <option value="lunes">Lunes</option>
      <option value="martes">Martes</option>
      <option value="miércoles">Miércoles</option>
      <option value="jueves">Jueves</option>
      <option value="viernes">Viernes</option>
      <option value="sábado">Sábado</option>
      <option value="domingo">Domingo</option>
    </select>
    <button onclick="ejecutarDia()">Verificar</button>
    <div class="resultado" id="res-dia"></div>
  </div>

  <!-- ternario -->
  <div class="card">
    <h2>3. Operador ternario — Aprobar o reprobar</h2>
    <label for="nota">Ingresa tu nota (0 - 10):</label>
    <input type="number" id="nota" placeholder="Ej: 7" min="0" max="10" step="0.5">
    <button onclick="ejecutarNota()">Verificar</button>
    <div class="resultado" id="res-nota"></div>
  </div>

  <!-- nullish coalescing -->
  <div class="card">
    <h2>4. Nullish coalescing (??) — Valor por defecto</h2>
    <label for="entrada">Ingresa un valor (o deja vacío para simular null):</label>
    <input type="text" id="entrada" placeholder="Tu valor">
    <button onclick="ejecutarEntrada()">Verificar</button>
    <div class="resultado" id="res-entrada"></div>
  </div>

  <!-- optional chaining -->
  <div class="card">
    <h2>5. Optional chaining (?.) — Acceder a propiedad de objeto</h2>
    <label for="usuario">Ingresa un nombre (o deja vacío para simular null):</label>
    <input type="text" id="usuario" placeholder="Ej: James">
    <button onclick="ejecutarUsuario()">Verificar</button>
    <div class="resultado" id="res-usuario"></div>
  </div>

  <!-- Se llama al archivo de la clase -->
  <script src="clase-condicional.js"></script>

  <script>
    function mostrar(id, mensaje) {
      const el = document.getElementById(id)
      el.textContent = '→ ' + mensaje
      el.style.display = 'block'
    }

    function ejecutarCalificacion() {
      const valor = parseFloat(document.getElementById('calificacion').value)
      if (isNaN(valor)) { mostrar('res-calificacion', 'Ingresa un número válido.'); return }
      mostrar('res-calificacion', verificarCalificacion(valor))
    }

    function ejecutarDia() {
      const valor = document.getElementById('dia').value
      mostrar('res-dia', verificarDia(valor))
    }

    function ejecutarNota() {
      const valor = parseFloat(document.getElementById('nota').value)
      if (isNaN(valor)) { mostrar('res-nota', 'Ingresa un número válido.'); return }
      mostrar('res-nota', verificarNota(valor))
    }

    function ejecutarEntrada() {
      const input = document.getElementById('entrada').value.trim()
      const valor = input === '' ? null : input
      mostrar('res-entrada', verificarEntrada(valor))
    }

    function ejecutarUsuario() {
      const input = document.getElementById('usuario').value.trim()
      const obj = input === '' ? null : { nombre: input }
      mostrar('res-usuario', verificarUsuario(obj))
    }
  </script>

</body>
</html>
